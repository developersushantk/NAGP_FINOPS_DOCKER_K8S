apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: school-hpa
  namespace: sushant
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: school-api
  minReplicas: 4
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
